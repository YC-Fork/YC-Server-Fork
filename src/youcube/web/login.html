<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-g">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; background-color: #282c34; color: #abb2bf; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background-color: #3b4048; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #61afef; }
        form { display: flex; flex-direction: column; }
        input { padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #1c1f24; border-radius: 4px; background-color: #21252b; color: #abb2bf; }
        button { padding: 0.7rem; background-color: #61afef; color: #282c34; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: #e06c75; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Admin Login</h1>
        <form method="post">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
